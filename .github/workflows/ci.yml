name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run demo pipeline
        run: |
          python examples/make_demo_sprite.py
          python sprite_animator.py --source examples/acorn_kid/source_idle.png --out /tmp/test_output --name test_sprite
          ls -la /tmp/test_output/
